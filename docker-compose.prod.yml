# ══════════════════════════════════════════════════════════════
# docker-compose.prod.yml — Ambiente de PRODUÇÃO (servidor)
# ══════════════════════════════════════════════════════════════
# Sobe SÓ o Hub em container. O banco é EXTERNO (Oracle da empresa,
# schema HUB_PROD) — definido pelo DATABASE_URL no .env.producao.
#
# Subir/atualizar:
#   docker compose -f docker-compose.prod.yml up -d --build
# (ou rode: ./deploy/atualizar.sh prod)
#
# O Hub fica exposto em 127.0.0.1:8000 e o Nginx faz a ponte para fora
# (com HTTPS). 'restart: always' garante que ele volta sozinho após
# reinício do servidor ou queda.
# ══════════════════════════════════════════════════════════════

services:

  hub:
    build: .
    image: hub-automacoes:prod
    container_name: hub_app_prod
    restart: always
    env_file:
      - .env.producao            # copie de .env.prod.example e preencha
    ports:
      # Só no localhost do servidor: quem expõe para a rede é o Nginx.
      - "127.0.0.1:8000:8000"
