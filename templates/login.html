<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Hub de Automações Ciamed</title>
    <link rel="icon" href="/static/img/logosvg.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(135deg, #1a2332 0%, #0f3057 50%, #05776c 100%);
            background-size: 20px 20px, 100% 100%;
            overflow: hidden;
        }

        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px -15px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #05776c, #4db6ac);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 10px 25px -8px rgba(5,119,108,0.5);
        }

        .login-logo i {
            font-size: 28px;
            color: white;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitulo {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .form-group input:focus {
            border-color: #4db6ac;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(77,182,172,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #05776c, #00796b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            box-shadow: 0 8px 20px -8px rgba(5,119,108,0.5);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -8px rgba(5,119,108,0.6);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .erro-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .erro-msg i {
            font-size: 0.9rem;
        }

        .rodape {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <i class="fa-solid fa-robot"></i>
        </div>

        <h1>Hub de Automações</h1>
        <p class="subtitulo">Identifique-se para acessar o sistema</p>

        {% if erro %}
        <div class="erro-msg">
            <i class="fa-solid fa-triangle-exclamation"></i>
            {{ erro }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu.email@ciamed.com.br" required autofocus>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">
                Entrar <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>

        <p class="rodape">Ciamed — Controladoria • Acesso Restrito</p>
    </div>
</body>
</html>
