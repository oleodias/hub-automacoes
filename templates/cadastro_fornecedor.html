<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fornecedores - Hub Ciamed</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="/static/img/logosvg.svg" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/index.css') }}"
    />
  </head>
  <body>
    <div class="sidebar">
      <a
        href="/"
        data-bs-toggle="tooltip"
        data-bs-placement="right"
        title="Início"
        ><i class="fa-solid fa-house"></i
      ></a>
      <a
        href="https://www.ciamed.com.br/home.html"
        target="_blank"
        data-bs-toggle="tooltip"
        data-bs-placement="right"
        title="Site Oficial"
        class="mt-md-auto"
        ><i class="fa-solid fa-globe"></i
      ></a>
      <a
        href="/admin"
        target="_blank"
        data-bs-toggle="tooltip"
        data-bs-placement="right"
        title="Painel Admin"
        ><i class="fa-solid fa-circle-user"></i
      ></a>
      <a
        href="/suporte"
        target="_blank"
        data-bs-toggle="tooltip"
        data-bs-placement="right"
        title="Suporte"
        ><i class="fa-solid fa-comments"></i
      ></a>
    </div>

    <nav class="navbar-ciamed">
      <div class="d-flex align-items-center text-white fw-bold fs-4">
        <img src="/static/img/ciamedia.png" alt="Ciamed" class="brand-logo" />
        <span class="border-start ps-3 fs-5 fw-light">Hub de Automações</span>
      </div>
    </nav>

    <div class="main-content">
      <div class="main-content">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-secondary fw-light m-0 d-flex align-items-center">
          <button
            class="btn btn-sm btn-light me-3 shadow-sm d-flex justify-content-center align-items-center"
            onclick="window.location.href='/'"
            style="
              border-radius: 50%;
              width: 35px;
              height: 35px;
              border: 1px solid #cbd5e1;
              transition: 0.3s;
            "
            title="Voltar ao Painel Principal"
          >
            <i class="fa-solid fa-arrow-left text-secondary"></i>
          </button>
          Módulo: Cadastro de Fornecedores
        </h4>
        <span class="badge" style="background-color: var(--ciamed-teal); padding: 8px 15px">Integração BrasilAPI</span>
      </div>

      <div class="row mb-4">
        <div class="col-md-12 mb-3">
            <div class="card card-custom p-4 text-center">
                <h5 class="mb-3">Busca Automática Receita Federal</h5>
                <p class="text-muted small mb-3">
                    Digite o CNPJ para buscar os dados antes de iniciar a automação.
                </p>
                
                <div class="row g-2 justify-content-center mb-4">
                    <div class="col-12 col-md-6 text-center">
                        <div class="input-group">
                            <input type="text" id="cnpjInput" class="form-control form-control-sm border-secondary-subtle shadow-sm" placeholder="00.000.000/0000-00" maxlength="18">
                            <button class="btn btn-ciamed btn-sm px-3" type="button" id="btnConsultar">
                                Buscar
                            </button>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <span class="status-dot bg-gray" id="dot-fornecedor"></span>
                    <span id="txt-fornecedor" class="text-muted fw-bold">Aguardando CNPJ...</span>
                </div>
            </div>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-12 mb-3">
            <div class="card card-custom p-4">
                <h5 class="mb-3 border-bottom pb-2 text-secondary"><i class="fa-solid fa-list-check me-2"></i>Revisão de Dados</h5>
                <form id="formFornecedor" class="row g-3">
                    <div class="col-md-9">
                        <label class="form-label fw-bold text-secondary small mb-1">Razão Social</label>
                        <input type="text" id="razaoSocial" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-secondary small mb-1">Tipo</label>
                        <input type="text" id="matrizFilial" class="form-control form-control-sm bg-light border-secondary-subtle text-center" readonly>
                    </div>

                    <div class="col-md-9">
                        <label class="form-label fw-bold text-secondary small mb-1">Nome Fantasia</label>
                        <input type="text" id="nomeFantasia" class="form-control form-control-sm border-secondary-subtle">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-secondary small mb-1">Data Abertura</label>
                        <input type="text" id="dataAbertura" class="form-control form-control-sm bg-light border-secondary-subtle text-center" readonly>
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary small mb-1">Natureza Jurídica</label>
                        <input type="text" id="naturezaJuridica" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>
                    
                    <div class="col-md-3">
                        <label class="form-label fw-bold text-secondary small mb-1">CEP</label>
                        <input type="text" id="cep" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>
                    <div class="col-md-7">
                        <label class="form-label fw-bold text-secondary small mb-1">Logradouro (Endereço)</label>
                        <input type="text" id="logradouro" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold text-secondary small mb-1">Número</label>
                        <input type="text" id="numero" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small mb-1">Complemento</label>
                        <input type="text" id="complemento" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small mb-1">Cidade / UF</label>
                        <input type="text" id="cidade" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary small mb-1">CNAE Principal</label>
                        <input type="text" id="cnaePrincipal" class="form-control form-control-sm bg-light border-secondary-subtle" readonly>
                    </div>
                </form>

                <button
                    class="btn fw-bold w-100 mt-4 d-none"
                    style="
                        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
                        color: white;
                        border: none;
                        padding: 12px;
                        border-radius: 10px;
                    "
                    id="btnIniciarRobo"
                >
                    <i class="fa-solid fa-play me-2"></i> Iniciar Cadastro no ERP
                </button>
            </div>
        </div>
      </div>

      <div class="card card-custom card-log-wrapper">
        <div class="card-header bg-transparent border-0 pt-3 fw-bold text-secondary d-flex justify-content-between align-items-center">
          <div>
            <i class="fa-solid fa-terminal me-2"></i> Console do Robô Fornecedores
          </div>
          <i class="fa-solid fa-expand fs-5 icon-expand-hover" onclick="toggleExpandirLog(this)"></i>
        </div>
        <div class="console-log mx-3 mb-3" id="terminal-fornecedor">
          <div>> Sistema de Fornecedores pronto para operar.</div>
        </div>
      </div>

    </div>
        
      </div>
      </div>
    </div>
    <audio id="audioSucesso" preload="auto">
      <source src="{{ url_for('static', filename='som_notificacao.wav') }}" type="audio/wav" />
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cadastro_fornecedor.js') }}"></script>
  </body>
</html>
