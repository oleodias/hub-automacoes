<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório MDF-e - Hub Ciamed</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="/static/img/logosvg.svg" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/index.css') }}"
    />
  </head>
  <body>
    <div class="sidebar">
      <a href="/"><i class="fa-solid fa-house"></i></a>
      <a
        href="https://www.ciamed.com.br/home.html"
        target="_blank"
        class="mt-md-auto"
        ><i class="fa-solid fa-globe"></i
      ></a>
      <a href="/admin" target="_blank"
        ><i class="fa-solid fa-circle-user"></i
      ></a>
      <a href="/suporte" target="_blank"
        ><i class="fa-solid fa-comments"></i
      ></a>
    </div>

    <nav class="navbar-ciamed">
      <div class="d-flex align-items-center text-white fw-bold fs-4">
        <img src="/static/img/ciamedia.png" alt="Ciamed" class="brand-logo" />
        <span class="border-start ps-3 fs-5 fw-light">Hub de Automações</span>
      </div>
    </nav>

    <div class="main-content">
      <div id="tela-mdf">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="text-secondary fw-light m-0 d-flex align-items-center">
            <button
              class="btn btn-sm btn-light me-3 shadow-sm d-flex justify-content-center align-items-center"
              onclick="window.location.href = '/'"
              style="
                border-radius: 50%;
                width: 35px;
                height: 35px;
                border: 1px solid #cbd5e1;
                transition: 0.3s;
              "
              title="Voltar ao Painel Principal"
            >
              <i class="fa-solid fa-arrow-left text-secondary"></i>
            </button>
            Módulo: Relatório MDF-e
          </h4>
        </div>

        <div class="row mb-4">
          <div class="col-md-12 mb-3">
            <div class="card card-custom p-4 text-center">
              <h5 class="mb-3">Extração de Dados NL</h5>
              <p class="text-muted small mb-3">
                Escolha o período e o robô fará o resto.
              </p>

              <div class="row g-2 mb-4">
                <div
                  class="col-12 d-flex justify-content-between align-items-center mb-1"
                >
                  <label class="small fw-bold text-secondary m-0"
                    >Período de Pesquisa</label
                  >
                  <a
                    href="javascript:void(0)"
                    onclick="limparDatas()"
                    class="text-decoration-none small text-danger"
                    style="font-size: 0.75rem"
                  >
                    <i class="fa-solid fa-eraser me-1"></i>Limpar
                  </a>
                </div>
                <div class="col-6 text-start">
                  <input
                    type="date"
                    id="mdf-inicio"
                    class="form-control form-control-sm border-secondary-subtle shadow-sm"
                  />
                </div>
                <div class="col-6 text-start">
                  <input
                    type="date"
                    id="mdf-fim"
                    class="form-control form-control-sm border-secondary-subtle shadow-sm"
                  />
                </div>
              </div>

              <div class="mb-4">
                <span class="status-dot bg-gray" id="dot-mdf"></span>
                <span id="txt-mdf" class="text-muted fw-bold"
                  >Pronto para iniciar</span
                >
              </div>

              <button
                class="btn fw-bold w-100"
                style="
                  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
                  color: white;
                  border: none;
                  padding: 12px;
                  border-radius: 10px;
                "
                id="btn-mdf"
                onclick="rodarMDF()"
              >
                <i class="fa-solid fa-play me-2"></i> Iniciar Extração
              </button>

              <button
                class="btn btn-success fw-bold w-50 mx-auto mt-3"
                id="btn-download-mdf"
                onclick="baixarRelatorio()"
                style="display: none; border-radius: 10px; padding: 12px"
              >
                <i class="fa-solid fa-file-excel me-2"></i> Baixar Relatório
                (.xlsx)
              </button>
            </div>
          </div>
        </div>

        <div class="card card-custom card-log-wrapper">
          <div
            class="card-header bg-transparent border-0 pt-3 fw-bold text-secondary d-flex justify-content-between align-items-center"
          >
            <div>
              <i class="fa-solid fa-terminal me-2"></i> Console do Robô MDF
            </div>
            <i
              class="fa-solid fa-expand fs-5 icon-expand-hover"
              onclick="toggleExpandirLog(this)"
            ></i>
          </div>
          <div class="console-log mx-3 mb-3" id="terminal-mdf">
            <div>> Sistema MDF pronto para operar.</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
  </body>
</html>
