<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Itens - Hub Ciamed</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="/static/img/logosvg.svg" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/index.css') }}"
    />
  </head>
  <body>
    <div class="sidebar">
      <a href="/"><i class="fa-solid fa-house"></i></a>
      <a
        href="https://www.ciamed.com.br/home.html"
        target="_blank"
        class="mt-md-auto"
        ><i class="fa-solid fa-globe"></i
      ></a>
      <a href="/admin" target="_blank"
        ><i class="fa-solid fa-circle-user"></i
      ></a>
      <a href="/suporte" target="_blank"
        ><i class="fa-solid fa-comments"></i
      ></a>
    </div>

    <nav class="navbar-ciamed">
      <div class="d-flex align-items-center text-white fw-bold fs-4">
        <img src="/static/img/ciamedia.png" alt="Ciamed" class="brand-logo" />
        <span class="border-start ps-3 fs-5 fw-light">Hub de Automações</span>
      </div>
    </nav>

    <div class="main-content">
      <div id="tela-fiscal">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="text-secondary fw-light m-0 d-flex align-items-center">
            <button
              class="btn btn-sm btn-light me-3 shadow-sm d-flex justify-content-center align-items-center"
              onclick="window.location.href = '/'"
              style="
                border-radius: 50%;
                width: 35px;
                height: 35px;
                border: 1px solid #cbd5e1;
                transition: 0.3s;
              "
              title="Voltar ao Painel Principal"
            >
              <i class="fa-solid fa-arrow-left text-secondary"></i>
            </button>
            Módulo: Entrada de Notas
          </h4>
          <span
            class="badge"
            style="background-color: var(--ciamed-teal); padding: 8px 15px"
            >Versão 1.0</span
          >
        </div>

        <div class="row mb-4">
          <div class="col-12">
            <div class="card card-custom p-4">
              <h5 class="text-secondary mb-3">
                <i class="fa-solid fa-file-import me-2"></i> Entrada de
                Documentos
              </h5>
              <ul class="nav nav-tabs mb-4" id="importTabs">
                <li class="nav-item">
                  <button
                    class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#upload-pane"
                  >
                    <i class="fa-solid fa-laptop-file me-2"></i>Anexar XML
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#sefaz-pane"
                  >
                    <i class="fa-solid fa-globe me-2"></i>Buscar SEFAZ
                  </button>
                </li>
              </ul>
              <div class="tab-content">
                <div class="tab-pane fade show active" id="upload-pane">
                  <div
                    class="upload-area"
                    id="dropZone"
                    onclick="document.getElementById('fileInput').click()"
                  >
                    <i
                      id="uploadIcon"
                      class="fa-solid fa-cloud-arrow-up fa-3x mb-3"
                      style="color: var(--ciamed-teal)"
                    ></i>
                    <h5 id="uploadText" class="text-secondary">
                      Selecione ou Arraste o XML
                    </h5>
                    <input
                      type="file"
                      id="fileInput"
                      style="display: none"
                      accept=".xml"
                    />
                  </div>
                </div>
                <div class="tab-pane fade" id="sefaz-pane">
                  <div class="text-center py-3">
                    <div
                      class="input-group mb-2 mx-auto"
                      style="max-width: 600px"
                    >
                      <span class="input-group-text bg-light"
                        ><i class="fa-solid fa-barcode"></i
                      ></span>
                      <input
                        type="text"
                        id="chaveAcesso"
                        class="form-control"
                        placeholder="Chave de Acesso (44 dígitos)"
                        maxlength="44"
                      />
                      <button
                        class="btn btn-ciamed px-3"
                        style="width: auto"
                        onclick="buscarSefaz()"
                      >
                        Buscar
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-6 mb-3">
            <div class="card card-custom p-4 h-100">
              <div class="d-flex justify-content-between">
                <h5>Fase 1: NCM</h5>
                <span class="badge bg-secondary" id="badge-fase1"
                  >Pendente</span
                >
              </div>
              <div class="mt-3 mb-4">
                <span class="status-dot bg-gray" id="dot-fase1"></span>
                <span id="txt-fase1" class="text-muted small"
                  >Aguardando arquivo...</span
                >
              </div>
              <button
                class="btn btn-ciamed"
                id="btn-fase1"
                disabled
                onclick="rodarFase1()"
              >
                Validar NCMs
              </button>
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <div class="card card-custom p-4 h-100">
              <div class="d-flex justify-content-between">
                <h5>Fase 2: Itens</h5>
                <span class="badge bg-secondary" id="badge-fase2"
                  >Bloqueado</span
                >
              </div>
              <div class="mt-3 mb-4">
                <span class="status-dot bg-gray" id="dot-fase2"></span>
                <span id="txt-fase2" class="text-muted small"
                  >Aguardando Fase 1...</span
                >
              </div>
              <button
                class="btn btn-ciamed"
                id="btn-fase2"
                disabled
                onclick="rodarFase2()"
              >
                Cadastrar Itens
              </button>
            </div>
          </div>
        </div>

        <div class="card card-custom" id="container-do-log">
          <div
            class="card-header bg-transparent border-0 pt-3 fw-bold text-secondary d-flex justify-content-between align-items-center"
          >
            <div>
              <i class="fa-solid fa-terminal me-2"></i> Console de Execução
            </div>
            <button
              class="btn btn-sm text-secondary"
              onclick="alternarTelaCheia()"
              title="Expandir/Reduzir Terminal"
              style="border: none; background: transparent"
            >
              <i class="fa-solid fa-expand fs-5 icon-expand-hover"></i>
            </button>
          </div>
          <div class="console-log mx-3 mb-3" id="terminal">
            <div>> Sistema Fiscal pronto para operar.</div>
          </div>
        </div>
      </div>
    </div>
    <audio id="audioSucesso" preload="auto">
      <source
        src="{{ url_for('static', filename='som_notificacao.wav') }}"
        type="audio/wav"
      />
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cadastro_itens.js') }}"></script>
  </body>
</html>
