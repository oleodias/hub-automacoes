<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório MDF-e - Hub Ciamed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="icon" href="/static/img/logosvg.svg" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}" />
    <style>
      :root {
        --bg-base:       #090d14;
        --bg-surface:    #0f1623;
        --bg-card:       #131c2e;
        --border:        rgba(255,255,255,0.06);
        --border-hover:  rgba(255,255,255,0.13);
        --teal:          #0ee6b8;
        --teal-dim:      rgba(14,230,184,0.10);
        --amber:         #f59e0b;
        --amber-dim:     rgba(245,158,11,0.10);
        --green:         #34d399;
        --green-dim:     rgba(52,211,153,0.10);
        --text-primary:  #e8edf5;
        --text-secondary:#7a8ba3;
        --text-muted:    #4a5a72;
        --sidebar-w:     64px;
        --nav-h:         64px;
        --font-head:     'Syne', sans-serif;
        --font-body:     'DM Sans', sans-serif;
        --font-mono:     'Courier New', monospace;
        --radius-card:   14px;
        --radius-sm:     8px;
        --transition:    0.22s cubic-bezier(.4,0,.2,1);
      }
      *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
      body {
        background:var(--bg-base); color:var(--text-primary);
        font-family:var(--font-body); font-size:15px; line-height:1.6;
        min-height:100vh; overflow-x:hidden;
        animation:pageEnter 0.35s ease forwards;
      }
      @keyframes pageEnter { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
      body::before {
        content:''; position:fixed; inset:0;
        background-image:linear-gradient(rgba(14,230,184,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(14,230,184,0.015) 1px,transparent 1px);
        background-size:48px 48px; pointer-events:none; z-index:0;
      }
      .sidebar {
        position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w);
        background:var(--bg-surface); border-right:1px solid var(--border);
        display:flex; flex-direction:column; align-items:center;
        padding:20px 0; gap:6px; z-index:100;
      }
      .sidebar::after {
        content:''; position:absolute; top:0; right:-1px; bottom:0; width:1px;
        background:linear-gradient(180deg,transparent,var(--teal),transparent); opacity:0.35;
      }
      .sidebar a {
        width:42px; height:42px; display:flex; align-items:center; justify-content:center;
        color:var(--text-muted); border-radius:var(--radius-sm); text-decoration:none;
        font-size:16px; transition:var(--transition);
      }
      .sidebar a:hover { color:var(--teal); background:var(--teal-dim); }
      .sidebar a.mt-md-auto { margin-top:auto; }
      .navbar-ciamed {
        position:fixed; top:0; left:var(--sidebar-w); right:0; height:var(--nav-h);
        background:rgba(9,13,20,0.85); backdrop-filter:blur(20px);
        border-bottom:1px solid var(--border); display:flex;
        align-items:center; padding:0 32px; z-index:99;
      }
      .brand-logo { height:32px; }
      .divider-text {
        font-family:var(--font-body); font-weight:300; font-size:13px;
        letter-spacing:0.08em; color:var(--text-muted);
        border-left:1px solid var(--border-hover); padding-left:16px; margin-left:16px; text-transform:uppercase;
      }
      .main-content {
        margin-left:var(--sidebar-w); padding-top:calc(var(--nav-h) + 36px);
        padding-bottom:60px; padding-left:40px; padding-right:40px;
        position:relative; z-index:1; max-width:860px;
      }
      .page-header {
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom:32px; opacity:0; transform:translateY(14px);
        animation:fadeUp 0.45s 0.05s ease forwards;
      }
      .page-header .left { display:flex; align-items:center; gap:14px; }
      .btn-back {
        width:36px; height:36px; background:var(--bg-surface);
        border:1px solid var(--border-hover); border-radius:50%;
        display:flex; align-items:center; justify-content:center;
        color:var(--text-secondary); cursor:pointer; transition:var(--transition);
      }
      .btn-back:hover { color:var(--teal); border-color:var(--teal); background:var(--teal-dim); }
      .page-title { font-family:var(--font-head); font-size:18px; font-weight:600; color:var(--text-primary); }
      .page-title span { font-size:13px; font-weight:400; color:var(--text-secondary); display:block; margin-top:1px; }
      .card-dark {
        background:var(--bg-card); border:1px solid var(--border);
        border-radius:var(--radius-card); padding:28px;
        opacity:0; transform:translateY(16px); animation:fadeUp 0.45s ease forwards;
      }
      .card-title-row {
        display:flex; align-items:center; gap:10px; margin-bottom:24px;
        padding-bottom:16px; border-bottom:1px solid var(--border);
      }
      .card-title-row i { color:var(--amber); font-size:14px; }
      .card-title-row h5 {
        font-family:var(--font-head); font-size:14px; font-weight:600;
        color:var(--text-primary); margin:0;
      }

      /* PERIOD PICKER */
      .period-section { margin-bottom:24px; }
      .period-label-row {
        display:flex; justify-content:space-between; align-items:center;
        margin-bottom:10px;
      }
      .period-label {
        font-size:11px; font-weight:500; letter-spacing:0.1em;
        text-transform:uppercase; color:var(--text-muted);
      }
      .btn-limpar {
        font-size:11px; color:#f87171;
        background:transparent; border:none;
        cursor:pointer; padding:0; transition:var(--transition);
        letter-spacing:0.04em;
      }
      .btn-limpar:hover { color:#ef4444; }
      .date-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
      .input-date {
        background:var(--bg-surface); border:1px solid var(--border-hover);
        border-radius:var(--radius-sm); padding:10px 14px;
        color:var(--text-primary); font-family:var(--font-body); font-size:13px;
        outline:none; transition:var(--transition); width:100%;
        color-scheme:dark;
      }
      .input-date:focus { border-color:var(--amber); box-shadow:0 0 0 3px var(--amber-dim); }

      /* STATUS */
      .status-row {
        display:flex; align-items:center; gap:10px; padding:12px 16px;
        background:var(--bg-surface); border-radius:var(--radius-sm);
        border:1px solid var(--border); margin-bottom:20px;
      }
      .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
      .bg-gray { background:var(--text-muted); }
      .status-row span { font-size:13px; color:var(--text-secondary); }

      /* BUTTONS */
      .btn-amber {
        width:100%; padding:13px;
        background:linear-gradient(135deg, #f59e0b, #d97706);
        color:#fff; border:none; border-radius:var(--radius-sm);
        font-family:var(--font-head); font-weight:700; font-size:14px;
        cursor:pointer; transition:var(--transition); letter-spacing:0.02em;
        display:flex; align-items:center; justify-content:center; gap:8px;
      }
      .btn-amber:hover { filter:brightness(1.08); transform:translateY(-1px); }
      .btn-amber:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

      .btn-download {
        display:none; margin:12px auto 0;
        padding:11px 28px;
        background:linear-gradient(135deg, #059669, #047857);
        color:#fff; border:none; border-radius:var(--radius-sm);
        font-family:var(--font-head); font-weight:600; font-size:13px;
        cursor:pointer; transition:var(--transition);
        align-items:center; gap:8px;
      }
      .btn-download:hover { filter:brightness(1.08); transform:translateY(-1px); }

      /* CONSOLE */
      .console-wrap {
        background:#050810; border:1px solid var(--border); border-radius:var(--radius-sm);
        padding:16px; font-family:var(--font-mono); font-size:12px; color:#4ade80;
        min-height:130px; max-height:260px; overflow-y:auto; line-height:1.7;
      }
      .console-wrap::-webkit-scrollbar { width:4px; }
      .console-wrap::-webkit-scrollbar-thumb { background:var(--border-hover); border-radius:4px; }
      .console-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
      .console-label {
        display:flex; align-items:center; gap:8px; font-family:var(--font-head);
        font-size:12px; font-weight:600; letter-spacing:0.08em;
        text-transform:uppercase; color:var(--text-secondary);
      }
      .console-label i { color:var(--amber); }
      .icon-expand-hover { color:var(--text-muted); cursor:pointer; transition:var(--transition); font-size:14px; }
      .icon-expand-hover:hover { color:var(--amber); }

      @keyframes fadeUp { to{opacity:1;transform:translateY(0);} }
      @media(max-width:768px) {
        .main-content{padding-left:20px;padding-right:20px;}
        .date-grid{grid-template-columns:1fr;}
      }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <a href="/"><i class="fa-solid fa-house"></i></a>
      <a href="https://www.ciamed.com.br/home.html" target="_blank" class="mt-md-auto">
        <i class="fa-solid fa-globe"></i>
      </a>
      <a href="/admin" target="_blank"><i class="fa-solid fa-circle-user"></i></a>
      <a href="/suporte" target="_blank"><i class="fa-solid fa-comments"></i></a>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar-ciamed">
      <img src="/static/img/ciamedia.png" alt="Ciamed" class="brand-logo" />
      <span class="divider-text">Hub de Automações</span>
    </nav>

    <!-- MAIN -->
    <div class="main-content">
      <div id="tela-mdf">

        <!-- HEADER -->
        <div class="page-header">
          <div class="left">
            <button class="btn-back" onclick="window.location.href='/'" title="Voltar">
              <i class="fa-solid fa-arrow-left" style="font-size:13px;"></i>
            </button>
            <div class="page-title">
              Relatório MDF-e
              <span>Extração de Dados · Sistema NL</span>
            </div>
          </div>
        </div>

        <!-- EXTRAÇÃO -->
        <div class="card-dark" style="margin-bottom:20px; animation-delay:0.10s;">
          <div class="card-title-row">
            <i class="fa-solid fa-truck-fast"></i>
            <h5>Extração de Dados NL</h5>
          </div>

          <p style="font-size:13px; color:var(--text-secondary); margin-bottom:20px;">
            Escolha o período e o robô fará o resto.
          </p>

          <div class="period-section">
            <div class="period-label-row">
              <span class="period-label">Período de Pesquisa</span>
              <button class="btn-limpar" onclick="limparDatas()">
                <i class="fa-solid fa-eraser me-1"></i>Limpar
              </button>
            </div>
            <div class="date-grid">
              <input type="date" id="mdf-inicio" class="input-date" />
              <input type="date" id="mdf-fim" class="input-date" />
            </div>
          </div>

          <div class="status-row">
            <span class="status-dot bg-gray" id="dot-mdf"></span>
            <span id="txt-mdf">Pronto para iniciar</span>
          </div>

          <button class="btn-amber" id="btn-mdf" onclick="rodarMDF()">
            <i class="fa-solid fa-play"></i> Iniciar Extração
          </button>

          <div style="display:flex; justify-content:center;">
            <button class="btn-download" id="btn-download-mdf" onclick="baixarRelatorio()"
                    style="display:none;">
              <i class="fa-solid fa-file-excel me-2"></i> Baixar Relatório (.xlsx)
            </button>
          </div>
        </div>

        <!-- CONSOLE -->
        <div class="card-dark" style="animation-delay:0.18s;">
          <div class="console-header">
            <div class="console-label">
              <i class="fa-solid fa-terminal"></i> Console do Robô MDF
            </div>
            <i class="fa-solid fa-expand icon-expand-hover" onclick="toggleExpandirLog(this)"></i>
          </div>
          <div class="console-wrap" id="terminal-mdf">
            <div>> Sistema MDF pronto para operar.</div>
          </div>
        </div>

      </div>
    </div>

    <audio id="audioSucesso" preload="auto">
      <source src="{{ url_for('static', filename='som_notificacao.wav') }}" type="audio/wav" />
    </audio>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/relatorio_mdf.js') }}"></script>
  </body>
</html>
