<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório MDF-e - Hub Ciamed</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/static/img/logosvg.svg" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css_reestilizados/relatorio_mdf_claude.css') }}"
    />
  </head>
  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <a href="/"><i class="fa-solid fa-house"></i></a>
      <a
        href="https://www.ciamed.com.br/home.html"
        target="_blank"
        class="mt-md-auto"
      >
        <i class="fa-solid fa-globe"></i>
      </a>
      <a href="/admin" target="_blank"
        ><i class="fa-solid fa-circle-user"></i
      ></a>
      <a href="/suporte" target="_blank"
        ><i class="fa-solid fa-comments"></i
      ></a>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar-ciamed">
      <img src="/static/img/ciamedia.png" alt="Ciamed" class="brand-logo" />
      <span class="divider-text">Hub de Automações</span>
    </nav>

    <!-- MAIN -->
    <div class="main-content">
      <div id="tela-mdf">
        <!-- HEADER -->
        <div class="page-header">
          <div class="left">
            <button
              class="btn-back"
              onclick="window.location.href = '/'"
              title="Voltar"
            >
              <i class="fa-solid fa-arrow-left" style="font-size: 13px"></i>
            </button>
            <div class="page-title">
              Relatório MDF-e
              <span>Extração de Dados · Sistema NL</span>
            </div>
          </div>
        </div>

        <!-- EXTRAÇÃO -->
        <div
          class="card-dark"
          style="margin-bottom: 20px; animation-delay: 0.1s"
        >
          <div class="card-title-row">
            <i class="fa-solid fa-truck-fast"></i>
            <h5>Extração de Dados NL</h5>
          </div>

          <p
            style="
              font-size: 13px;
              color: var(--text-secondary);
              margin-bottom: 20px;
            "
          >
            Escolha o período e o robô fará o resto.
          </p>

          <div class="period-section">
            <div class="period-label-row">
              <span class="period-label">Período de Pesquisa</span>
              <button class="btn-limpar" onclick="limparDatas()">
                <i class="fa-solid fa-eraser me-1"></i>Limpar
              </button>
            </div>
            <div class="date-grid">
              <input type="date" id="mdf-inicio" class="input-date" />
              <input type="date" id="mdf-fim" class="input-date" />
            </div>
          </div>

          <div class="status-row">
            <span class="status-dot bg-gray" id="dot-mdf"></span>
            <span id="txt-mdf">Pronto para iniciar</span>
          </div>

          <button class="btn-amber" id="btn-mdf" onclick="rodarMDF()">
            <i class="fa-solid fa-play"></i> Iniciar Extração
          </button>

          <div style="display: flex; justify-content: center">
            <button
              class="btn-download"
              id="btn-download-mdf"
              onclick="baixarRelatorio()"
              style="display: none"
            >
              <i class="fa-solid fa-file-excel me-2"></i> Baixar Relatório
              (.xlsx)
            </button>
          </div>
        </div>

        <!-- CONSOLE -->
        <div class="card-dark" style="animation-delay: 0.18s">
          <div class="console-header">
            <div class="console-label">
              <i class="fa-solid fa-terminal"></i> Console do Robô MDF
            </div>
            <i
              class="fa-solid fa-expand icon-expand-hover"
              onclick="toggleExpandirLog(this)"
            ></i>
          </div>
          <div class="console-wrap" id="terminal-mdf">
            <div>> Sistema MDF pronto para operar.</div>
          </div>
        </div>
      </div>
    </div>

    <audio id="audioSucesso" preload="auto">
      <source
        src="{{ url_for('static', filename='som_notificacao.wav') }}"
        type="audio/wav"
      />
    </audio>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    <script src="{{ url_for('static', filename='js/relatorio_mdf.js') }}"></script>
  </body>
</html>
